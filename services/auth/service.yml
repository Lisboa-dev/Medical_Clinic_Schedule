services:
  auth-service:
    build:
      context: .
    env_file:
      - path: ../../.env
        required: false
      - path: ./.env
        required: false
    environment:
      AUTH_PORT: ${AUTH_PORT:-8000}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://users-service:8000}
      OPENFGA_ENABLED: ${OPENFGA_ENABLED:-true}
      OPENFGA_API_URL: ${OPENFGA_API_URL:-http://openfga:8080}
      OPENFGA_STORE_NAME: ${OPENFGA_STORE_NAME:-agendamento-medico}
      OPENFGA_AUTHZ_FAIL_OPEN: ${OPENFGA_AUTHZ_FAIL_OPEN:-false}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-service.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth-service.entrypoints=web"
      - "traefik.http.services.auth-service.loadbalancer.server.port=8000"
      - "traefik.http.routers.auth-health.rule=Path(`/auth/health`)"
      - "traefik.http.routers.auth-health.entrypoints=web"
      - "traefik.http.routers.auth-health.middlewares=auth-health-strip"
      - "traefik.http.routers.auth-health.priority=100"
      - "traefik.http.routers.auth-health.service=auth-service"
      - "traefik.http.middlewares.auth-health-strip.stripprefix.prefixes=/auth"
      - "traefik.docker.network=web"
    ports:
      - "${AUTH_PORT:-8000}:8000"
    depends_on:
      openfga-init:
        condition: service_completed_successfully
    networks:
      - web
      - auth-net

networks:
  web:
    name: web
  auth-net:
